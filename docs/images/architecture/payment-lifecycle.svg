<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" font-family="'Courier New', Courier, monospace">
  <rect width="760" height="480" fill="#0f0f0f"/>

  <text x="380" y="30" fill="#e8d5b7" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="1">Payment Lifecycle — Direct Transfer</text>
  <text x="380" y="48" fill="#555" font-size="10" text-anchor="middle">POST /transfers → atomic double-entry ledger posting</text>

  <!-- Stages column -->
  <!-- Stage 1: Validation -->
  <rect x="40" y="70" width="680" height="64" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="40" y="70" width="4" height="64" rx="2" fill="#ffc107"/>
  <text x="60" y="92" fill="#ffc107" font-size="9" font-weight="bold" letter-spacing="0.8">STAGE 1 — VALIDATION</text>
  <text x="60" y="109" fill="#aaa" font-size="10">wallet exists? · amount &gt; 0? · same wallet? → reject · idempotency key used? → return existing</text>
  <text x="60" y="124" fill="#555" font-size="9">✗ fail → 422 Unprocessable Entity</text>

  <!-- Arrow -->
  <line x1="380" y1="134" x2="380" y2="148" stroke="#333" stroke-width="1"/>
  <polygon points="376,148 380,154 384,148" fill="#333"/>

  <!-- Stage 2: Ledger Posting -->
  <rect x="40" y="154" width="680" height="84" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="40" y="154" width="4" height="84" rx="2" fill="#4caf50"/>
  <text x="60" y="176" fill="#4caf50" font-size="9" font-weight="bold" letter-spacing="0.8">STAGE 2 — ATOMIC LEDGER POSTING</text>
  <!-- Two entry boxes -->
  <rect x="60" y="183" width="280" height="44" rx="3" fill="#0f1510" stroke="#1a2e1a" stroke-width="1"/>
  <text x="200" y="200" fill="#f44336" font-size="9" text-anchor="middle" font-weight="bold">DEBIT</text>
  <text x="200" y="215" fill="#aaa" font-size="9" text-anchor="middle">sender wallet  −{amount}</text>
  <text x="200" y="228" fill="#444" font-size="8" text-anchor="middle">trace_id · correlation_id</text>

  <rect x="360" y="183" width="280" height="44" rx="3" fill="#0f1510" stroke="#1a2e1a" stroke-width="1"/>
  <text x="500" y="200" fill="#4caf50" font-size="9" text-anchor="middle" font-weight="bold">CREDIT</text>
  <text x="500" y="215" fill="#aaa" font-size="9" text-anchor="middle">receiver wallet +{amount}</text>
  <text x="500" y="228" fill="#444" font-size="8" text-anchor="middle">trace_id · correlation_id</text>

  <text x="340" y="212" fill="#555" font-size="10" text-anchor="middle">+</text>

  <!-- Arrow -->
  <line x1="380" y1="238" x2="380" y2="252" stroke="#333" stroke-width="1"/>
  <polygon points="376,252 380,258 384,252" fill="#333"/>

  <!-- Stage 3: Events -->
  <rect x="40" y="258" width="680" height="64" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="40" y="258" width="4" height="64" rx="2" fill="#4caf50"/>
  <text x="60" y="280" fill="#4caf50" font-size="9" font-weight="bold" letter-spacing="0.8">STAGE 3 — EVENTS EMITTED</text>
  <text x="60" y="297" fill="#aaa" font-size="10">payment.sent { transfer_id, from_wallet_id, amount_minor, currency }</text>
  <text x="60" y="312" fill="#aaa" font-size="10">payment.received { transfer_id, to_wallet_id, amount_minor, currency }</text>

  <!-- Arrow -->
  <line x1="380" y1="322" x2="380" y2="336" stroke="#333" stroke-width="1"/>
  <polygon points="376,336 380,342 384,336" fill="#333"/>

  <!-- Stage 4: Response -->
  <rect x="40" y="342" width="680" height="64" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="40" y="342" width="4" height="64" rx="2" fill="#e8d5b7"/>
  <text x="60" y="364" fill="#e8d5b7" font-size="9" font-weight="bold" letter-spacing="0.8">STAGE 4 — RESPONSE</text>
  <text x="60" y="381" fill="#aaa" font-size="10">SandboxTransfer { id, trace_id, correlation_id, from_wallet_id, to_wallet_id, amount_minor, currency, ... }</text>
  <text x="60" y="396" fill="#444" font-size="9">HTTP 200 OK</text>

  <!-- Invariants box -->
  <rect x="40" y="424" width="680" height="42" rx="4" fill="#0f1510" stroke="#1a2e1a" stroke-width="1"/>
  <text x="380" y="440" fill="#2a4a2a" font-size="9" text-anchor="middle" letter-spacing="0.8">INVARIANTS ENFORCED: no negative balance · double-entry sums to zero · idempotent · append-only ledger · atomic</text>
  <text x="380" y="458" fill="#2a4a2a" font-size="9" text-anchor="middle">trace_id propagates to all ledger entries and events</text>
</svg>
