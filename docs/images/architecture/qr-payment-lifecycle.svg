<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" font-family="'Courier New', Courier, monospace">
  <rect width="760" height="520" fill="#0f0f0f"/>

  <text x="380" y="30" fill="#e8d5b7" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="1">QR Payment Lifecycle</text>
  <text x="380" y="48" fill="#555" font-size="10" text-anchor="middle">POST /qr → POST /qr/{id}/pay → single-use transfer</text>

  <!-- Merchant side -->
  <rect x="30" y="66" width="200" height="80" rx="5" fill="#181818" stroke="#2a2a2a"/>
  <text x="130" y="86" fill="#666" font-size="9" text-anchor="middle" letter-spacing="0.6">MERCHANT</text>
  <text x="130" y="103" fill="#e8d5b7" font-size="11" text-anchor="middle" font-weight="bold">POST /qr</text>
  <text x="130" y="118" fill="#555" font-size="9" text-anchor="middle">merchant_wallet_id</text>
  <text x="130" y="132" fill="#555" font-size="9" text-anchor="middle">amount_minor? · currency</text>

  <!-- Arrow merchant → QR created -->
  <line x1="230" y1="106" x2="310" y2="106" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="310,102 318,106 310,110" fill="#444"/>

  <!-- QR Created box -->
  <rect x="318" y="66" width="410" height="80" rx="4" fill="#141414" stroke="#2a2a2a"/>
  <text x="360" y="86" fill="#e8d5b7" font-size="9" font-weight="bold" letter-spacing="0.6">QR CREATED  (status: active)</text>
  <text x="360" y="102" fill="#aaa" font-size="9">id: qr-xxx · trace_id: tr-abc (new root)</text>
  <text x="360" y="116" fill="#555" font-size="9">payload: BANZA-SBX:{base64}</text>
  <text x="360" y="130" fill="#4caf50" font-size="9">emit → qr.generated</text>

  <!-- Consumer -->
  <rect x="30" y="186" width="200" height="80" rx="5" fill="#181818" stroke="#2a2a2a"/>
  <text x="130" y="206" fill="#666" font-size="9" text-anchor="middle" letter-spacing="0.6">CONSUMER</text>
  <text x="130" y="223" fill="#e8d5b7" font-size="11" text-anchor="middle" font-weight="bold">POST /qr/{id}/pay</text>
  <text x="130" y="238" fill="#555" font-size="9" text-anchor="middle">consumer_wallet_id</text>
  <text x="130" y="252" fill="#555" font-size="9" text-anchor="middle">amount_minor? (open QR)</text>

  <!-- Down arrow merchant flow -->
  <line x1="130" y1="146" x2="130" y2="186" stroke="#333" stroke-width="1"/>
  <polygon points="126,186 130,192 134,186" fill="#333"/>

  <!-- Arrow consumer → validate -->
  <line x1="230" y1="226" x2="310" y2="226" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="310,222 318,226 310,230" fill="#444"/>

  <!-- Validation -->
  <rect x="318" y="186" width="410" height="60" rx="4" fill="#141414" stroke="#2a2a2a"/>
  <text x="360" y="206" fill="#ffc107" font-size="9" font-weight="bold" letter-spacing="0.6">VALIDATION</text>
  <text x="360" y="222" fill="#aaa" font-size="9">QR active? · amount resolved (fixed or consumer-supplied) · amount &gt; 0?</text>
  <text x="360" y="238" fill="#555" font-size="9">fail → 422   |   pass ↓</text>

  <!-- Arrow → Transfer -->
  <line x1="523" y1="246" x2="523" y2="266" stroke="#333" stroke-width="1"/>
  <polygon points="519,266 523,272 527,266" fill="#333"/>

  <!-- Transfer + Ledger -->
  <rect x="318" y="272" width="410" height="90" rx="4" fill="#0f1510" stroke="#1a2e1a"/>
  <text x="360" y="292" fill="#4caf50" font-size="9" font-weight="bold" letter-spacing="0.6">TRANSFER CREATED  (inherits QR trace)</text>
  <text x="360" y="308" fill="#aaa" font-size="9">trace_id: tr-abc  ← inherited from QR</text>
  <text x="360" y="322" fill="#aaa" font-size="9">causation_id: qr-xxx  ← QR caused this transfer</text>
  <text x="360" y="336" fill="#555" font-size="9">DEBIT consumer · CREDIT merchant · both trace_id: tr-abc</text>
  <text x="360" y="350" fill="#4caf50" font-size="9">emit → payment.sent · payment.received</text>

  <!-- Arrow → QR updated -->
  <line x1="523" y1="362" x2="523" y2="382" stroke="#333" stroke-width="1"/>
  <polygon points="519,382 523,388 527,382" fill="#333"/>

  <!-- QR updated -->
  <rect x="318" y="388" width="410" height="56" rx="4" fill="#141414" stroke="#2a2a2a"/>
  <text x="360" y="408" fill="#e8d5b7" font-size="9" font-weight="bold" letter-spacing="0.6">QR UPDATED  (status: paid)</text>
  <text x="360" y="424" fill="#aaa" font-size="9">transfer_id: txfr-yyy · paid_at: now</text>
  <text x="360" y="438" fill="#4caf50" font-size="9">emit → qr.paid { qr_id, transfer_id, amount_minor }</text>

  <!-- Trace box -->
  <rect x="30" y="462" width="700" height="42" rx="4" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="380" y="479" fill="#3a3a6a" font-size="9" text-anchor="middle" letter-spacing="0.6">GET /traces/tr-abc →  qr_codes[qr-xxx] + transfers[txfr-yyy] + ledger_entries[2] + events[3] — full causal chain</text>
  <text x="380" y="497" fill="#2a2a55" font-size="8" text-anchor="middle">Second POST /qr/{id}/pay → 422  "QR code is Paid, not active"</text>
</svg>
