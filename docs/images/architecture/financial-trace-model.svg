<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" font-family="'Courier New', Courier, monospace">
  <rect width="760" height="480" fill="#0f0f0f"/>

  <text x="380" y="30" fill="#e8d5b7" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="1">Financial Trace Model</text>
  <text x="380" y="48" fill="#555" font-size="10" text-anchor="middle">trace_id · correlation_id · causation_id — three identifiers, full causal chain</text>

  <!-- trace_id box -->
  <rect x="30" y="66" width="700" height="56" rx="5" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="50" y="88" fill="#6060b0" font-size="10" font-weight="bold">trace_id</text>
  <text x="50" y="106" fill="#aaa" font-size="9">One UUID per top-level user operation. Created once, inherited unchanged by all derived operations (transfers, ledger entries, events).</text>
  <text x="660" y="88" fill="#3a3a6a" font-size="9" text-anchor="middle">scope: flow</text>

  <!-- correlation_id box -->
  <rect x="30" y="138" width="700" height="56" rx="5" fill="#141414" stroke="#2a2a2a"/>
  <text x="50" y="160" fill="#e8d5b7" font-size="10" font-weight="bold">correlation_id</text>
  <text x="50" y="178" fill="#aaa" font-size="9">Identifies the current aggregate step within the trace. Changes as the operation moves through layers (PR → transfer → ledger entry).</text>
  <text x="660" y="160" fill="#444" font-size="9" text-anchor="middle">scope: step</text>

  <!-- causation_id box -->
  <rect x="30" y="210" width="700" height="56" rx="5" fill="#141414" stroke="#2a2a2a"/>
  <text x="50" y="232" fill="#ab47bc" font-size="10" font-weight="bold">causation_id</text>
  <text x="50" y="250" fill="#aaa" font-size="9">The ID of the direct cause. Absent on root operations. Present when a transfer was caused by a payment request or QR payment.</text>
  <text x="660" y="232" fill="#444" font-size="9" text-anchor="middle">scope: link</text>

  <!-- Example: PR flow -->
  <text x="30" y="288" fill="#555" font-size="9" letter-spacing="0.8">EXAMPLE — Payment Request Flow</text>
  <line x1="30" y1="294" x2="730" y2="294" stroke="#1e1e1e" stroke-width="1"/>

  <!-- PR created -->
  <rect x="30" y="302" width="200" height="70" rx="4" fill="#181818" stroke="#252520"/>
  <text x="130" y="320" fill="#ffc107" font-size="8" text-anchor="middle" letter-spacing="0.6">PAYMENT REQUEST</text>
  <text x="130" y="336" fill="#aaa" font-size="9" text-anchor="middle" font-weight="bold">pr-abc</text>
  <text x="130" y="350" fill="#6060b0" font-size="8" text-anchor="middle">trace_id: tr-xyz</text>
  <text x="130" y="364" fill="#e8d5b7" font-size="8" text-anchor="middle">correlation: tr-xyz</text>

  <!-- Arrow -->
  <line x1="230" y1="337" x2="270" y2="337" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="270,333 278,337 270,341" fill="#444"/>
  <text x="254" y="330" fill="#444" font-size="8" text-anchor="middle">pay</text>

  <!-- Transfer -->
  <rect x="278" y="302" width="200" height="70" rx="4" fill="#0f1510" stroke="#1a2e1a"/>
  <text x="378" y="320" fill="#4caf50" font-size="8" text-anchor="middle" letter-spacing="0.6">TRANSFER</text>
  <text x="378" y="336" fill="#aaa" font-size="9" text-anchor="middle" font-weight="bold">txfr-def</text>
  <text x="378" y="350" fill="#6060b0" font-size="8" text-anchor="middle">trace_id: tr-xyz ← inherited</text>
  <text x="378" y="364" fill="#e8d5b7" font-size="8" text-anchor="middle">causation: pr-abc ← caused by PR</text>

  <!-- Arrow -->
  <line x1="478" y1="337" x2="518" y2="337" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="518,333 526,337 518,341" fill="#444"/>

  <!-- Ledger entries -->
  <rect x="526" y="302" width="204" height="70" rx="4" fill="#141414" stroke="#252525"/>
  <text x="628" y="320" fill="#555" font-size="8" text-anchor="middle" letter-spacing="0.6">LEDGER ENTRIES (×2)</text>
  <text x="628" y="336" fill="#f44336" font-size="8" text-anchor="middle">DEBIT sender</text>
  <text x="628" y="350" fill="#4caf50" font-size="8" text-anchor="middle">CREDIT receiver</text>
  <text x="628" y="364" fill="#6060b0" font-size="8" text-anchor="middle">trace_id: tr-xyz · corr: txfr-def</text>

  <!-- Events bar -->
  <rect x="30" y="388" width="700" height="44" rx="4" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="380" y="406" fill="#3a3a6a" font-size="9" text-anchor="middle" letter-spacing="0.6">EVENTS EMITTED  (all carry trace_id: tr-xyz)</text>
  <text x="380" y="422" fill="#2a2a55" font-size="9" text-anchor="middle">payment_request.created · payment.sent · payment.received · payment_request.paid</text>

  <!-- Trace API box -->
  <rect x="30" y="446" width="700" height="26" rx="4" fill="#181818" stroke="#1a1a2e"/>
  <text x="380" y="464" fill="#6060b0" font-size="9" text-anchor="middle">GET /traces/tr-xyz  →  full timeline, all transfers, ledger entries, events, payment_requests</text>
</svg>
