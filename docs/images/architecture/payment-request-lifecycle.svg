<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 490" width="760" height="490" font-family="'Courier New', Courier, monospace">
  <rect width="760" height="490" fill="#0f0f0f"/>

  <text x="380" y="30" fill="#e8d5b7" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="1">Payment Request Lifecycle</text>
  <text x="380" y="48" fill="#555" font-size="10" text-anchor="middle">pull payment — merchant creates request, consumer pays it once</text>

  <!-- Merchant -->
  <rect x="30" y="66" width="200" height="80" rx="5" fill="#181818" stroke="#2a2a2a"/>
  <text x="130" y="86" fill="#666" font-size="9" text-anchor="middle" letter-spacing="0.6">MERCHANT</text>
  <text x="130" y="103" fill="#e8d5b7" font-size="11" text-anchor="middle" font-weight="bold">POST /payment-requests</text>
  <text x="130" y="120" fill="#555" font-size="9" text-anchor="middle">to_wallet_id · amount_minor</text>
  <text x="130" y="136" fill="#555" font-size="9" text-anchor="middle">currency · description</text>

  <!-- Arrow → PR created -->
  <line x1="230" y1="106" x2="310" y2="106" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="310,102 318,106 310,110" fill="#444"/>

  <!-- PR created -->
  <rect x="318" y="66" width="410" height="80" rx="4" fill="#252520" stroke="#333320"/>
  <text x="523" y="86" fill="#ffc107" font-size="9" text-anchor="middle" font-weight="bold" letter-spacing="0.6">PR CREATED  (status: pending)</text>
  <text x="523" y="102" fill="#aaa" font-size="9" text-anchor="middle">id: pr-xxx · trace_id: tr-abc (new root)</text>
  <text x="523" y="118" fill="#555" font-size="9" text-anchor="middle">transfer_id: null · from_wallet_id: null</text>
  <text x="523" y="134" fill="#ffc107" font-size="9" text-anchor="middle">emit → payment_request.created</text>

  <!-- Consumer -->
  <rect x="30" y="186" width="200" height="80" rx="5" fill="#181818" stroke="#2a2a2a"/>
  <text x="130" y="206" fill="#666" font-size="9" text-anchor="middle" letter-spacing="0.6">CONSUMER</text>
  <text x="130" y="223" fill="#e8d5b7" font-size="11" text-anchor="middle" font-weight="bold">POST /payment-requests</text>
  <text x="130" y="240" fill="#e8d5b7" font-size="11" text-anchor="middle" font-weight="bold">/{pr_id}/pay</text>
  <text x="130" y="258" fill="#555" font-size="9" text-anchor="middle">from_wallet_id</text>

  <!-- Vertical arrow (merchant → consumer) -->
  <line x1="130" y1="146" x2="130" y2="186" stroke="#333" stroke-width="1"/>
  <polygon points="126,186 130,192 134,186" fill="#333"/>

  <!-- Arrow consumer → validation -->
  <line x1="230" y1="226" x2="310" y2="226" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="310,222 318,226 310,230" fill="#444"/>

  <!-- Validation -->
  <rect x="318" y="186" width="410" height="60" rx="4" fill="#141414" stroke="#2a2a2a"/>
  <text x="523" y="206" fill="#ffc107" font-size="9" text-anchor="middle" font-weight="bold" letter-spacing="0.6">VALIDATION</text>
  <text x="523" y="222" fill="#aaa" font-size="9" text-anchor="middle">PR exists? · status == pending?</text>
  <text x="523" y="238" fill="#555" font-size="9" text-anchor="middle">status != pending → 422 · pass ↓</text>

  <line x1="523" y1="246" x2="523" y2="264" stroke="#333" stroke-width="1"/>
  <polygon points="519,264 523,270 527,264" fill="#333"/>

  <!-- Transfer creation -->
  <rect x="318" y="270" width="410" height="80" rx="4" fill="#0f1510" stroke="#1a2e1a"/>
  <text x="523" y="290" fill="#4caf50" font-size="9" text-anchor="middle" font-weight="bold" letter-spacing="0.6">TRANSFER CREATED  (inherits PR trace)</text>
  <text x="523" y="306" fill="#aaa" font-size="9" text-anchor="middle">trace_id: tr-abc  ← inherited from PR</text>
  <text x="523" y="322" fill="#aaa" font-size="9" text-anchor="middle">causation_id: pr-xxx  ← PR caused this transfer</text>
  <text x="523" y="338" fill="#555" font-size="9" text-anchor="middle">DEBIT consumer · CREDIT merchant</text>
  <text x="523" y="352" fill="#4caf50" font-size="9" text-anchor="middle">emit → payment.sent · payment.received</text>

  <line x1="523" y1="350" x2="523" y2="368" stroke="#333" stroke-width="1"/>
  <polygon points="519,368 523,374 527,368" fill="#333"/>

  <!-- PR updated -->
  <rect x="318" y="374" width="410" height="56" rx="4" fill="#252520" stroke="#333320"/>
  <text x="523" y="394" fill="#ffc107" font-size="9" text-anchor="middle" font-weight="bold" letter-spacing="0.6">PR UPDATED  (status: paid)</text>
  <text x="523" y="410" fill="#aaa" font-size="9" text-anchor="middle">transfer_id: txfr-yyy · from_wallet_id: consumer · paid_at: now</text>
  <text x="523" y="426" fill="#ffc107" font-size="9" text-anchor="middle">emit → payment_request.paid</text>

  <!-- Second pay attempt -->
  <rect x="30" y="444" width="700" height="32" rx="4" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="380" y="465" fill="#cc4444" font-size="9" text-anchor="middle">Second POST /payment-requests/{id}/pay  →  422  "payment request is Paid, not pending"</text>
</svg>
