<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500" font-family="'Courier New', Courier, monospace">
  <rect width="760" height="500" fill="#0f0f0f"/>

  <text x="380" y="30" fill="#e8d5b7" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="1">Event Flow — Banzami Kernel</text>
  <text x="380" y="48" fill="#555" font-size="10" text-anchor="middle">every state-changing operation emits events with full trace context</text>

  <!-- Left: operations -->
  <rect x="30" y="66" width="230" height="310" rx="5" fill="#141414" stroke="#2a2a2a"/>
  <text x="145" y="86" fill="#666" font-size="9" text-anchor="middle" letter-spacing="0.8">OPERATIONS</text>

  <rect x="46" y="96" width="198" height="30" rx="3" fill="#1a2e1a" stroke="#252525"/>
  <text x="145" y="116" fill="#4caf50" font-size="9" text-anchor="middle">POST /transfers</text>

  <rect x="46" y="134" width="198" height="30" rx="3" fill="#1a2e1a" stroke="#252525"/>
  <text x="145" y="154" fill="#4caf50" font-size="9" text-anchor="middle">POST /payment-requests/:id/pay</text>

  <rect x="46" y="172" width="198" height="30" rx="3" fill="#252520" stroke="#252525"/>
  <text x="145" y="192" fill="#ffc107" font-size="9" text-anchor="middle">POST /payment-requests</text>

  <rect x="46" y="210" width="198" height="30" rx="3" fill="#252520" stroke="#252525"/>
  <text x="145" y="230" fill="#ffc107" font-size="9" text-anchor="middle">POST /qr/:id/pay</text>

  <rect x="46" y="248" width="198" height="30" rx="3" fill="#181818" stroke="#252525"/>
  <text x="145" y="268" fill="#e8d5b7" font-size="9" text-anchor="middle">POST /qr</text>

  <rect x="46" y="286" width="198" height="30" rx="3" fill="#181818" stroke="#252525"/>
  <text x="145" y="306" fill="#e8d5b7" font-size="9" text-anchor="middle">POST /wallets</text>

  <rect x="46" y="324" width="198" height="40" rx="3" fill="#0f1520" stroke="#252525"/>
  <text x="145" y="341" fill="#26c6da" font-size="9" text-anchor="middle">POST /settlement/batches</text>
  <text x="145" y="356" fill="#444" font-size="8" text-anchor="middle">(2 events)</text>

  <!-- Center: broadcast channel -->
  <rect x="292" y="140" width="176" height="160" rx="5" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="380" y="162" fill="#3a3a6a" font-size="9" text-anchor="middle" letter-spacing="0.8">broadcast::channel</text>
  <text x="380" y="178" fill="#6060b0" font-size="11" text-anchor="middle" font-weight="bold">(256 capacity)</text>

  <text x="380" y="200" fill="#2a2a55" font-size="9" text-anchor="middle">trace_id</text>
  <text x="380" y="215" fill="#2a2a55" font-size="9" text-anchor="middle">correlation_id</text>
  <text x="380" y="230" fill="#2a2a55" font-size="9" text-anchor="middle">causation_id?</text>
  <text x="380" y="245" fill="#2a2a55" font-size="9" text-anchor="middle">aggregate_type</text>
  <text x="380" y="260" fill="#2a2a55" font-size="9" text-anchor="middle">aggregate_id</text>
  <text x="380" y="275" fill="#2a2a55" font-size="9" text-anchor="middle">payload</text>
  <text x="380" y="292" fill="#2a2a45" font-size="8" text-anchor="middle">kept in memory (last 200)</text>

  <!-- Arrows ops → channel -->
  <line x1="244" y1="230" x2="290" y2="220" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="286,216 298,220 287,224" fill="#1a1a2e"/>

  <!-- Right: consumers -->
  <rect x="500" y="66" width="230" height="310" rx="5" fill="#141414" stroke="#2a2a2a"/>
  <text x="615" y="86" fill="#666" font-size="9" text-anchor="middle" letter-spacing="0.8">CONSUMERS</text>

  <rect x="516" y="96" width="198" height="40" rx="3" fill="#181818" stroke="#252525"/>
  <text x="615" y="113" fill="#aaa" font-size="9" text-anchor="middle" font-weight="bold">GET /events (SSE)</text>
  <text x="615" y="128" fill="#555" font-size="8" text-anchor="middle">EventSource · real-time · demo wallet</text>

  <rect x="516" y="144" width="198" height="40" rx="3" fill="#181818" stroke="#252525"/>
  <text x="615" y="161" fill="#aaa" font-size="9" text-anchor="middle" font-weight="bold">GET /events/history</text>
  <text x="615" y="176" fill="#555" font-size="8" text-anchor="middle">last 200 events · JSON · polling</text>

  <rect x="516" y="192" width="198" height="40" rx="3" fill="#181818" stroke="#252525"/>
  <text x="615" y="209" fill="#aaa" font-size="9" text-anchor="middle" font-weight="bold">GET /traces/{trace_id}</text>
  <text x="615" y="224" fill="#555" font-size="8" text-anchor="middle">events filtered by trace_id</text>

  <rect x="516" y="240" width="198" height="40" rx="3" fill="#0f1520" stroke="#1a1a2e"/>
  <text x="615" y="257" fill="#6060b0" font-size="9" text-anchor="middle" font-weight="bold">Webhooks (production)</text>
  <text x="615" y="272" fill="#2a2a55" font-size="8" text-anchor="middle">HMAC-signed HTTP POST</text>

  <rect x="516" y="288" width="198" height="40" rx="3" fill="#0f1520" stroke="#1a1a2e"/>
  <text x="615" y="305" fill="#6060b0" font-size="9" text-anchor="middle" font-weight="bold">Structured logs (production)</text>
  <text x="615" y="320" fill="#2a2a55" font-size="8" text-anchor="middle">trace_id in every log line</text>

  <!-- Arrows channel → consumers -->
  <line x1="468" y1="220" x2="514" y2="220" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="514,216 522,220 514,224" fill="#1a1a2e"/>

  <!-- Event types legend -->
  <rect x="30" y="396" width="700" height="90" rx="4" fill="#141414" stroke="#1e1e1e"/>
  <text x="380" y="414" fill="#555" font-size="9" text-anchor="middle" letter-spacing="0.6">EVENT TYPES</text>
  <text x="80" y="434" fill="#4caf50" font-size="9">payment.sent</text>
  <text x="80" y="450" fill="#4caf50" font-size="9">payment.received</text>
  <text x="230" y="434" fill="#ffc107" font-size="9">payment_request.created</text>
  <text x="230" y="450" fill="#ffc107" font-size="9">payment_request.paid</text>
  <text x="430" y="434" fill="#e8d5b7" font-size="9">qr.generated</text>
  <text x="430" y="450" fill="#e8d5b7" font-size="9">qr.paid</text>
  <text x="430" y="466" fill="#e8d5b7" font-size="9">wallet.created</text>
  <text x="590" y="434" fill="#26c6da" font-size="9">settlement.created</text>
  <text x="590" y="450" fill="#26c6da" font-size="9">settlement.completed</text>
</svg>
