<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="'Courier New', Courier, monospace">
  <rect width="760" height="440" fill="#0f0f0f"/>

  <text x="380" y="30" fill="#e8d5b7" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="1">Provider Model — Banza Kernel</text>
  <text x="380" y="48" fill="#555" font-size="10" text-anchor="middle">kernel calls through trait interfaces · swap sandbox → production without changing kernel code</text>

  <!-- Kernel box -->
  <rect x="260" y="64" width="240" height="70" rx="5" fill="#0f1510" stroke="#1a2e1a"/>
  <text x="380" y="86" fill="#2a4a2a" font-size="9" text-anchor="middle" letter-spacing="0.8">BANZA KERNEL CRATES</text>
  <text x="380" y="102" fill="#3d7a3d" font-size="10" text-anchor="middle">banza-types · banza-ledger</text>
  <text x="380" y="116" fill="#3d7a3d" font-size="10" text-anchor="middle">banza-wallets · banza-qr</text>

  <!-- Arrows kernel → providers -->
  <line x1="380" y1="134" x2="380" y2="170" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="380" y1="170" x2="100" y2="170" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="380" y1="170" x2="660" y2="170" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="100" y1="170" x2="100" y2="186" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="270" y1="170" x2="270" y2="186" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="490" y1="170" x2="490" y2="186" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="660" y1="170" x2="660" y2="186" stroke="#2a2a2a" stroke-width="1"/>
  <polygon points="96,186 100,194 104,186" fill="#2a2a2a"/>
  <polygon points="266,186 270,194 274,186" fill="#2a2a2a"/>
  <polygon points="486,186 490,194 494,186" fill="#2a2a2a"/>
  <polygon points="656,186 660,194 664,186" fill="#2a2a2a"/>

  <!-- Provider trait interfaces (horizontal row) -->
  <!-- Acquirer -->
  <rect x="30" y="194" width="140" height="40" rx="4" fill="#181818" stroke="#2a2a2a"/>
  <text x="100" y="211" fill="#666" font-size="8" text-anchor="middle" letter-spacing="0.6">TRAIT</text>
  <text x="100" y="226" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">AcquirerProvider</text>

  <!-- Settlement -->
  <rect x="200" y="194" width="140" height="40" rx="4" fill="#181818" stroke="#2a2a2a"/>
  <text x="270" y="211" fill="#666" font-size="8" text-anchor="middle" letter-spacing="0.6">TRAIT</text>
  <text x="270" y="226" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">SettlementProvider</text>

  <!-- Notifications -->
  <rect x="420" y="194" width="140" height="40" rx="4" fill="#181818" stroke="#2a2a2a"/>
  <text x="490" y="211" fill="#666" font-size="8" text-anchor="middle" letter-spacing="0.6">TRAIT</text>
  <text x="490" y="226" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">NotificationProvider</text>

  <!-- Routing -->
  <rect x="590" y="194" width="140" height="40" rx="4" fill="#181818" stroke="#2a2a2a"/>
  <text x="660" y="211" fill="#666" font-size="8" text-anchor="middle" letter-spacing="0.6">TRAIT</text>
  <text x="660" y="226" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">RoutingProvider</text>

  <!-- Dividers for sandbox vs prod -->
  <text x="380" y="265" fill="#444" font-size="8" text-anchor="middle" letter-spacing="1">SANDBOX IMPLEMENTATIONS   ▼</text>
  <text x="380" y="360" fill="#1a1a2e" font-size="8" text-anchor="middle" letter-spacing="1">PRODUCTION IMPLEMENTATIONS   ▼</text>

  <!-- Sandbox impls -->
  <rect x="30" y="272" width="140" height="60" rx="3" fill="#141414" stroke="#252525"/>
  <text x="100" y="292" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">FakeAcquirer</text>
  <text x="100" y="308" fill="#444" font-size="8" text-anchor="middle">HMAC-signed refs</text>
  <text x="100" y="322" fill="#444" font-size="8" text-anchor="middle">always succeeds</text>

  <rect x="200" y="272" width="140" height="60" rx="3" fill="#141414" stroke="#252525"/>
  <text x="270" y="292" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">SimulatedSettlement</text>
  <text x="270" y="308" fill="#444" font-size="8" text-anchor="middle">always succeeds</text>
  <text x="270" y="322" fill="#444" font-size="8" text-anchor="middle">SBX-SETTLE-{uuid}</text>

  <rect x="420" y="272" width="140" height="60" rx="3" fill="#141414" stroke="#252525"/>
  <text x="490" y="292" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">StdoutNotifications</text>
  <text x="490" y="308" fill="#444" font-size="8" text-anchor="middle">tracing::info! logs</text>
  <text x="490" y="322" fill="#444" font-size="8" text-anchor="middle">no network calls</text>

  <rect x="590" y="272" width="140" height="60" rx="3" fill="#141414" stroke="#252525"/>
  <text x="660" y="292" fill="#aaa" font-size="10" text-anchor="middle" font-weight="bold">MockRouting</text>
  <text x="660" y="308" fill="#444" font-size="8" text-anchor="middle">verbose / failing</text>
  <text x="660" y="322" fill="#444" font-size="8" text-anchor="middle">degraded modes</text>

  <!-- Production impls -->
  <rect x="30" y="370" width="140" height="56" rx="3" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="100" y="390" fill="#6060b0" font-size="10" text-anchor="middle" font-weight="bold">EmisAcquirer</text>
  <text x="100" y="406" fill="#2a2a55" font-size="8" text-anchor="middle">Multicaixa POS/e-commerce</text>
  <text x="100" y="420" fill="#2a2a45" font-size="8" text-anchor="middle">(operator-implemented)</text>

  <rect x="200" y="370" width="140" height="56" rx="3" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="270" y="390" fill="#6060b0" font-size="10" text-anchor="middle" font-weight="bold">BicssSettlement</text>
  <text x="270" y="406" fill="#2a2a55" font-size="8" text-anchor="middle">real RTGS/ACH rails</text>
  <text x="270" y="420" fill="#2a2a45" font-size="8" text-anchor="middle">(operator-implemented)</text>

  <rect x="420" y="370" width="140" height="56" rx="3" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="490" y="390" fill="#6060b0" font-size="10" text-anchor="middle" font-weight="bold">FcmApnsWebhook</text>
  <text x="490" y="406" fill="#2a2a55" font-size="8" text-anchor="middle">FCM · APNs · HTTP</text>
  <text x="490" y="420" fill="#2a2a45" font-size="8" text-anchor="middle">(operator-implemented)</text>

  <rect x="590" y="370" width="140" height="56" rx="3" fill="#0f1015" stroke="#1a1a2e"/>
  <text x="660" y="390" fill="#6060b0" font-size="10" text-anchor="middle" font-weight="bold">EmisRoutingTable</text>
  <text x="660" y="406" fill="#2a2a55" font-size="8" text-anchor="middle">rail selection logic</text>
  <text x="660" y="420" fill="#2a2a45" font-size="8" text-anchor="middle">(operator-implemented)</text>
</svg>
