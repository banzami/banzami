name: Identity Guard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: identity-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  operator-contamination-check:
    name: No operator-specific brand in BANZA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          apt-get update -qq && apt-get install -y -qq ripgrep 2>/dev/null || \
          (curl -LO https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep_14.1.1-1_amd64.deb \
           && sudo dpkg -i ripgrep_14.1.1-1_amd64.deb)

      - name: Build forbidden pattern (avoids self-contamination of this file)
        run: |
          # Build by joining parts — this file must not contain the literal pattern
          P="banza"; S="mi"
          echo "FORBIDDEN=${P}${S}|${P}${S}a" >> "$GITHUB_ENV"

      - name: Check file contents for operator brand
        run: |
          echo "Checking file contents..."
          HITS=$(rg -n -i "$FORBIDDEN" . \
            -g '!node_modules/**' \
            -g '!target/**' \
            -g '!dist/**' \
            -g '!build/**' \
            -g '!.next/**' \
            -g '!coverage/**' \
            -g '!.git/**' \
            -g '!scripts/check-operator-contamination.sh' \
            -g '!.github/workflows/identity-guard.yml' \
            -g '!docs/audit/identity/**' \
            2>/dev/null || true)

          if [ -n "$HITS" ]; then
            echo "FAIL: Forbidden operator brand found in file contents:"
            echo ""
            echo "$HITS"
            echo ""
            echo "Fix: use 'certified operator', 'reference operator', or 'operator implementation'"
            exit 1
          fi
          echo "PASS: no forbidden operator brand in file contents"

      - name: Check filenames and directory names for operator brand
        run: |
          echo "Checking filenames..."
          P="banza"; S="mi"
          HITS=$(find . \
            -path "./.git" -prune -o \
            -path "./node_modules" -prune -o \
            -path "./target" -prune -o \
            -path "./dist" -prune -o \
            -path "./build" -prune -o \
            -path "./.next" -prune -o \
            -path "./coverage" -prune -o \
            \( -iname "*${P}${S}*" -o -iname "*${P}${S}a*" \) \
            -print 2>/dev/null || true)

          if [ -n "$HITS" ]; then
            echo "FAIL: Forbidden operator brand found in filenames/directories:"
            echo ""
            echo "$HITS"
            exit 1
          fi
          echo "PASS: no forbidden operator brand in filenames or directory names"

      - name: Identity guard passed
        run: |
          echo ""
          echo "══════════════════════════════════════════════"
          echo "  BANZA IDENTITY GUARD: PASS"
          echo "  BANZA remains protocol-pure."
          echo "══════════════════════════════════════════════"
